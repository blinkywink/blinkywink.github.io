<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Browse all Ninjago wiki categories — Category:Fortnite tree." />
    <title>All pages • Fortnite Wiki Project</title>
    <link rel="stylesheet" href="/styles.css" />
    <meta name="theme-color" content="#06070a" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">
            <img class="brand-img" src="/assets/logo.png" alt="" loading="eager" decoding="async" />
          </span>
        </a>

        <input class="menu-toggle" type="checkbox" id="menu-toggle" />
        <label class="menu-button" for="menu-toggle" aria-label="Open navigation" role="button">
          <span class="menu-button-lines" aria-hidden="true">
            <span></span>
          </span>
        </label>

        <nav class="nav" aria-label="Primary">
          <a href="/characters">Characters</a>
          <a href="/episodes">Seasons</a>
          <a href="/weapons">Items</a>
          <a href="/sets">Cosmetics</a>
          <a href="/media">Media</a>
          <a href="/trivia" class="nav-link--featured">Trivia <span class="nav-badge">New</span></a>
          <a href="/all-pages" aria-current="page">All Pages</a>
        </nav>
      </div>
    </header>

    <main id="content" class="page">
      <section class="section section--tight">
        <div class="container section-head">
          <h1 class="section-title">All pages</h1>
        </div>

        <div class="container category-tree-layout">
          <p id="category-tree-status" class="characters-load-status" aria-live="polite">Loading category tree…</p>
          <nav
            id="category-tree-breadcrumb"
            class="category-tree-breadcrumb"
            aria-label="Category path"
            hidden
          ></nav>
          <div id="category-tree-root" class="category-tree-root" hidden aria-label="Category contents"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner footer-inner--min">
        <div class="footer-left">
          <div class="footer-meta">
            <div class="footer-line footer-line--muted">Fan-made Fortnite wiki. Not affiliated with Epic Games or Fortnite.</div>
          </div>
        </div>
        <div class="footer-links" aria-label="Footer links">
          <a class="footer-link" href="/about">About</a>
        </div>
      </div>
    </footer>

    <script src="/all-pages/tree.js" defer></script>
  </body>
</html>
